services:
  - type: web
    name: myapp
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:8000
    envVars:
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: prod
      # Supabase Auth (JWT verification)
      - key: SUPABASE_ISSUER
        value: https://<project-ref>.supabase.co/auth/v1
      - key: SUPABASE_JWKS_URL
        value: https://<project-ref>.supabase.co/auth/v1/.well-known/jwks.json
      - key: SUPABASE_AUDIENCE
        value: authenticated
      - key: SUPABASE_ACCEPTED_ALGS
        value: '["RS256","ES256"]'
      # Public (client-safe) key; used as `apikey` header if your JWKS endpoint is protected.
      - key: SUPABASE_ANON_KEY
        value: ""
    autoDeploy: true
    healthCheckPath: /api/v1/health

  - type: pserv
    name: myapp-db
    databaseName: myapp
    databaseUser: myappuser
    plan: free
